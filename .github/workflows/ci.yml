name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"
      - name: Build
        run: zig build --summary all

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"
      - name: Test
        run: zig build test --summary all

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"
      - name: Check formatting
        run: zig build fmt --summary all

  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"
      - name: Generate docs
        run: zig build docs

  bench:
    name: bench
    runs-on: ubuntu-latest
    steps:
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      # ── On PRs: relative comparison (base vs PR on same runner) ──
      - name: Checkout base branch
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
      - name: Benchmark base branch
        if: github.event_name == 'pull_request'
        run: |
          zig build bench -- --update --json > /tmp/base-bench.json
          cp bench/baselines.json /tmp/base-baselines.json

      - name: Checkout PR branch
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          clean: false
      - name: Benchmark PR branch (vs base)
        if: github.event_name == 'pull_request'
        run: |
          cp /tmp/base-baselines.json bench/baselines.json
          zig build bench -- --check --json > /tmp/pr-bench.json 2> /tmp/bench-output.txt
        # Allow this step to "fail" so we can still post the comment.
        # The regression is re-checked in the comment step below.
        continue-on-error: true
        id: bench_run

      - name: Comment on PR with benchmark results
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BENCH_OUTCOME: ${{ steps.bench_run.outcome }}
        run: |
          # Compare base and PR JSON results, emit a markdown table for
          # benchmarks with >= 20% change in either direction.
          python3 -c "
          import json, sys

          base = {b['name']: b for b in json.load(open('/tmp/base-bench.json'))['benchmarks']}
          pr   = {b['name']: b for b in json.load(open('/tmp/pr-bench.json'))['benchmarks']}

          def fmt_ns(ns):
              if ns < 1_000:       return f'{ns} ns'
              if ns < 1_000_000:   return f'{ns/1e3:.1f} µs'
              if ns < 1e9:         return f'{ns/1e6:.2f} ms'
              return f'{ns/1e9:.3f} s'

          rows = []
          has_regression = False
          for name in base:
              if name not in pr: continue
              b_ns, p_ns = base[name]['median_ns'], pr[name]['median_ns']
              pct = (p_ns - b_ns) / b_ns * 100
              if abs(pct) < 20: continue
              if pct > 0:
                  tag = f'+{pct:.1f}% 🔴'
                  has_regression = True
              else:
                  tag = f'{pct:.1f}% 🟢'
              rows.append((name, fmt_ns(b_ns), fmt_ns(p_ns), tag))

          if not rows:
              sys.exit(1)  # signal: no notable changes

          with open('/tmp/bench-comment.md', 'w') as f:
              f.write('## ⚡ Benchmark Report\n\n')
              f.write(f'Compared against base branch (\`${BASE_SHA}\`) on the same runner.\n\n')
              f.write('| Benchmark | Base | PR | Change |\n')
              f.write('|-----------|-----:|---:|--------|\n')
              for name, b, p, tag in rows:
                  f.write(f'| \`{name}\` | {b} | {p} | {tag} |\n')
              f.write('\n')
              if has_regression:
                  f.write('🔴 **Regressions detected** — review before merging.\n')
              else:
                  f.write('🟢 **Improvements only** — no regressions.\n')
          " && HAS_NOTABLE=true || HAS_NOTABLE=false

          if [ "$HAS_NOTABLE" = "false" ]; then
            echo "No notable benchmark changes (all within ±20%)"
            # Delete any previous bench comment to keep the PR clean.
            PREV=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --jq '.[] | select(.body | startswith("## ⚡ Benchmark")) | .id' 2>/dev/null | head -1)
            if [ -n "$PREV" ]; then
              gh api -X DELETE "repos/${GITHUB_REPOSITORY}/issues/comments/${PREV}"
            fi
          else
            # Upsert: update existing comment or create new one.
            PREV=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --jq '.[] | select(.body | startswith("## ⚡ Benchmark")) | .id' 2>/dev/null | head -1)
            if [ -n "$PREV" ]; then
              gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${PREV}" \
                -F body=@/tmp/bench-comment.md
            else
              gh pr comment "${PR_NUMBER}" --body-file /tmp/bench-comment.md
            fi
          fi

          # Fail the job if the bench run detected a regression.
          if [ "$BENCH_OUTCOME" = "failure" ]; then
            echo "::error::Benchmark regression detected"
            exit 1
          fi

      # ── On push to main: informational only (no regression check) ──
      - name: Checkout
        if: github.event_name == 'push'
        uses: actions/checkout@v4
      - name: Benchmark (informational)
        if: github.event_name == 'push'
        run: zig build bench

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"
      - name: AST check
        # zig ast-check gives fast syntax/parse feedback without full compilation.
        # zig build already provides type-level correctness; this catches malformed
        # source early in the pipeline without waiting for codegen.
        run: |
          find src examples -name '*.zig' -print0 | xargs -0 -n1 zig ast-check
          zig ast-check build.zig
