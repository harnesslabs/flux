name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"
      - name: Build
        run: zig build --summary all

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"
      - name: Test
        run: zig build test --summary all

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"
      - name: Check formatting
        run: zig build fmt --summary all

  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"
      - name: Generate docs
        run: zig build docs

  bench:
    name: bench
    runs-on: ubuntu-latest
    steps:
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      # ── On PRs: relative comparison (base vs PR on same runner) ──
      - name: Checkout base branch
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
      - name: Benchmark base branch
        if: github.event_name == 'pull_request'
        run: |
          zig build bench -- --update
          cp bench/baselines.json /tmp/base-baselines.json

      - name: Checkout PR branch
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          clean: false
      - name: Benchmark PR branch (vs base)
        if: github.event_name == 'pull_request'
        run: |
          cp /tmp/base-baselines.json bench/baselines.json
          zig build bench -- --check

      # ── On push to main: informational only (no regression check) ──
      - name: Checkout
        if: github.event_name == 'push'
        uses: actions/checkout@v4
      - name: Benchmark (informational)
        if: github.event_name == 'push'
        run: zig build bench

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"
      - name: AST check
        # zig ast-check gives fast syntax/parse feedback without full compilation.
        # zig build already provides type-level correctness; this catches malformed
        # source early in the pipeline without waiting for codegen.
        run: |
          find src -name '*.zig' -print0 | xargs -0 -n1 zig ast-check
          zig ast-check build.zig
