name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"
      - name: Build
        run: zig build --summary all

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"
      - name: Test
        run: zig build test --summary all

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"
      - name: Check formatting
        run: zig build fmt --summary all

  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"
      - name: Generate docs
        run: zig build docs

  bench:
    name: bench
    runs-on: ubuntu-latest
    steps:
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      # ── On PRs: relative comparison (base vs PR on same runner) ──
      - name: Checkout base branch
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
      - name: Benchmark base branch
        if: github.event_name == 'pull_request'
        run: |
          zig build bench -- --update
          cp bench/baselines.json /tmp/base-baselines.json

      - name: Checkout PR branch
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          clean: false
      - name: Benchmark PR branch (vs base)
        if: github.event_name == 'pull_request'
        run: |
          cp /tmp/base-baselines.json bench/baselines.json
          zig build bench -- --check 2> /tmp/bench-output.txt
        # Allow this step to "fail" so we can still post the comment.
        # The regression is re-checked in the comment step below.
        continue-on-error: true
        id: bench_run

      - name: Comment on PR with benchmark results
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BENCH_OUTCOME: ${{ steps.bench_run.outcome }}
        run: |
          # Extract lines with >= 20% change in either direction.
          # Bench output lines look like:
          #   hodge_star_2             22.0 µs  ...  24.2% faster
          #   exterior_derivative_d1   65.7 µs  ...  +81.4% REGRESSED
          #
          # grep -E pulls candidate lines, then python filters by the 20% threshold.
          # Using python avoids gawk dependency (ubuntu ships mawk).
          NOTABLE=$(grep -E '(% faster|% REGRESSED)' /tmp/bench-output.txt | python3 -c "
          import sys, re
          for line in sys.stdin:
              m = re.search(r'(\d+\.\d+)% (faster|REGRESSED)', line)
              if m and float(m.group(1)) >= 20:
                  print(line.strip())
          " || true)

          if [ -z "$NOTABLE" ]; then
            echo "No notable benchmark changes (all within ±20%)"
            # Delete any previous bench comment to keep the PR clean.
            PREV=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --jq '.[] | select(.body | startswith("## ⚡ Benchmark")) | .id' 2>/dev/null | head -1)
            if [ -n "$PREV" ]; then
              gh api -X DELETE "repos/${GITHUB_REPOSITORY}/issues/comments/${PREV}"
            fi
          else
            # Build the comment body.
            {
              echo "## ⚡ Benchmark Report"
              echo ""
              echo "Compared against base branch (\`${BASE_SHA}\`) on the same runner."
              echo ""
              echo '```'
              echo "$NOTABLE"
              echo '```'
              echo ""
              if echo "$NOTABLE" | grep -q "REGRESSED"; then
                echo "🔴 **Regressions detected** — review before merging."
              else
                echo "🟢 **Improvements only** — no regressions."
              fi
            } > /tmp/bench-comment.md

            # Upsert: update existing comment or create new one.
            PREV=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --jq '.[] | select(.body | startswith("## ⚡ Benchmark")) | .id' 2>/dev/null | head -1)
            if [ -n "$PREV" ]; then
              gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${PREV}" \
                -F body=@/tmp/bench-comment.md
            else
              gh pr comment "${PR_NUMBER}" --body-file /tmp/bench-comment.md
            fi
          fi

          # Fail the job if the bench run detected a regression.
          if [ "$BENCH_OUTCOME" = "failure" ]; then
            echo "::error::Benchmark regression detected"
            exit 1
          fi

      # ── On push to main: informational only (no regression check) ──
      - name: Checkout
        if: github.event_name == 'push'
        uses: actions/checkout@v4
      - name: Benchmark (informational)
        if: github.event_name == 'push'
        run: zig build bench

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"
      - name: AST check
        # zig ast-check gives fast syntax/parse feedback without full compilation.
        # zig build already provides type-level correctness; this catches malformed
        # source early in the pipeline without waiting for codegen.
        run: |
          find src -name '*.zig' -print0 | xargs -0 -n1 zig ast-check
          zig ast-check build.zig
