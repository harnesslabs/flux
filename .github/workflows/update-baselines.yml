name: Update Benchmark Baselines

# Generates benchmark baselines on the CI runner and commits them.
# Baselines must come from the same machine class (ubuntu-latest) that
# runs the regression check in ci.yml, so local baselines are not committed.
#
# Trigger: manually via workflow_dispatch, or automatically after merging
# performance-related changes to main.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/operators/**'
      - 'src/forms/**'
      - 'src/math/**'
      - 'src/topology/**'
      - 'bench/**'

permissions:
  contents: write

jobs:
  update-baselines:
    name: update-baselines
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Run benchmarks and update baselines
        run: zig build bench -- --update

      - name: Commit updated baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bench/baselines.json
          # Only commit if baselines actually changed.
          git diff --cached --quiet && echo "No baseline changes" || \
            git commit -m "chore(bench): update CI baselines [skip ci]" && \
            git push
